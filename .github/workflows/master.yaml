name: Push
on: [push]
jobs:
  Build-and-test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ["20", "22", "24", "26"]
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
